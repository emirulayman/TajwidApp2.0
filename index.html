<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajwid Masterclass | Quranic Recitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], arabic: ['Amiri', 'serif'] },
                    colors: { brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col md:flex-row min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-700 dark:text-slate-300">

    <nav class="w-full md:w-64 bg-white dark:bg-slate-800 shadow-lg md:min-h-screen z-10 flex-shrink-0 flex flex-col border-r border-transparent dark:border-slate-700 transition-colors">
        <div class="p-6 border-b border-gray-100 dark:border-slate-700">
            <h1 class="text-2xl font-bold text-brand-900 dark:text-brand-100 tracking-tight">Tajwid<span class="text-brand-500">Master</span></h1>
            
            <div class="mt-5 bg-gray-50 dark:bg-slate-700/50 p-3 rounded-lg border border-gray-100 dark:border-slate-600 transition-colors">
                <label for="reciter-select" class="block text-xs font-bold text-gray-500 dark:text-gray-300 uppercase tracking-wider mb-2">Reciter Voice</label>
                <select id="reciter-select" class="w-full bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 text-gray-700 dark:text-gray-200 text-sm rounded block p-2 outline-none">
                    <option value="Alafasy_128kbps">Mishary Alafasy</option>
                    <option value="Abdul_Basit_Murattal_192kbps">Abdul Basit (Murattal)</option>
                    <option value="Husary_128kbps">Mahmoud Al-Husary</option>
                    <option value="Minshawy_Murattal_128kbps">Minshawy (Murattal)</option>
                </select>
            </div>

            <div class="mt-3 flex items-center justify-between bg-gray-50 dark:bg-slate-700/50 p-3 rounded-lg border border-gray-100 dark:border-slate-600">
                <span class="text-xs font-bold text-gray-500 dark:text-gray-300 uppercase flex items-center gap-1">Dark Mode</span>
                <button id="theme-toggle" class="w-10 h-6 bg-gray-300 dark:bg-brand-500 rounded-full relative focus:outline-none" onclick="toggleTheme()">
                    <div id="theme-toggle-knob" class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 dark:translate-x-4 transition-transform"></div>
                </button>
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto py-4 px-3 flex flex-row md:flex-col gap-2">
            <button onclick="switchTab('intro')" class="nav-btn active w-full text-left px-4 py-3 rounded-lg text-sm font-medium" data-target="intro">Introduction</button>
            <button onclick="switchTab('makharij')" class="nav-btn w-full text-left px-4 py-3 rounded-lg text-sm font-medium" data-target="makharij">Makharij</button>
            <button onclick="switchTab('quiz')" class="nav-btn w-full text-left px-4 py-3 rounded-lg text-sm font-medium mt-auto" data-target="quiz">✨ Knowledge Check</button>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-10 lg:p-12 max-w-5xl mx-auto w-full">
        <section id="intro" class="tab-content active">
             <h2 class="text-3xl font-bold mb-6">Introduction to Tajwid</h2>
             <p>The science of articulating every Arabic letter from its precise origin.</p>
        </section>

        <section id="quiz" class="tab-content">
             <h2 class="text-3xl font-bold mb-6">Knowledge Check</h2>
             <div id="quiz-container">
                 <form id="quiz-form" onsubmit="submitQuiz(event)"></form>
                 <div id="quiz-results" class="hidden mt-8 p-6 rounded-xl text-center">
                    <h3 class="text-2xl font-bold mb-2" id="score-title">Score</h3>
                    <p id="score-text"></p>
                    <button onclick="resetQuiz()" class="bg-brand-500 text-white py-2 px-6 rounded-lg mt-4">Retake Quiz</button>
                 </div>
             </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
